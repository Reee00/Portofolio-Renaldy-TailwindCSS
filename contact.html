  <body
    data-nav-active="contact.html"
    class="font-inter bg-gradient-to-br from-slate-100 via-sky-50 to-white dark:bg-gradient-to-br dark:from-slate-900 dark:via-slate-800 dark:to-black text-slate-900 dark:text-slate-100 transition-colors duration-300"
  >
    <div id="site-header"></div>

    <main class="pt-16">
      <section class="max-w-3xl mx-auto px-4 sm:px-6 lg:px-8 py-6 sm:py-10 md:py-16 fade-in" aria-labelledby="contact-heading">
        <h1 id="contact-heading" class="text-2xl sm:text-3xl font-bold mb-3 sm:mb-4">Hubungi Saya</h1>
        <p class="text-slate-500 mb-6">
          Silakan kirim kebutuhan project, kolaborasi, atau pertanyaan teknis.
          Saya akan merespons secepatnya.
        </p>

        <form
          id="contactForm"
          class="glass p-6 rounded-xl space-y-4"
          action="https://formsubmit.co/ajax/ahmadd.renaldyy@gmail.com"
          method="POST"
        >
          <input type="hidden" name="_captcha" value="false" />
          <input type="hidden" name="_subject" value="Pesan baru dari portfolio" />
          <div>
            <label class="text-sm">Nama</label>
            <input
              id="name"
              name="name"
              required
              class="w-full p-3 mt-1 rounded-md bg-transparent border border-white/6 focus:outline-none"
              placeholder="Nama lengkap"
            />
          </div>
          <div>
            <label class="text-sm">Email</label>
            <input
              id="email"
              name="email"
              type="email"
              required
              class="w-full p-3 mt-1 rounded-md bg-transparent border border-white/6 focus:outline-none"
              placeholder="you@domain.com"
            />
          </div>
          <div>
            <label class="text-sm">Pesan</label>
            <textarea
              id="message"
              name="message"
              required
              rows="6"
              class="w-full p-3 mt-1 rounded-md bg-transparent border border-white/6 focus:outline-none"
              placeholder="Tulis pesan..."
            ></textarea>
          </div>
          <div>
            <button type="submit" class="btn-primary w-full">
              Kirim Pesan
            </button>
            <p class="text-xs text-slate-500 mt-3">
              Biasanya saya merespons dalam 1 x 24 jam pada hari kerja.
            </p>
            <p id="contactStatus" class="hidden text-xs mt-3" aria-live="polite"></p>
          </div>
        </form>
      </section>
    </main>

    <div id="site-footer"></div>

    <script src="js/mainn.js?v=20260319"></script>
