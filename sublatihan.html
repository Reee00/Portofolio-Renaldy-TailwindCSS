<!DOCTYPE html>
<html lang="id" class="scroll-smooth">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Detail Latihan Web | Portfolio Ahmad Renaldy</title>
    <link rel="icon" type="image/svg+xml" href="images/Webykai.svg" />
    <meta
      name="description"
      content="Halaman detail sub latihan pemrograman web Ahmad Renaldy dengan progress pembelajaran dan tautan tugas per pertemuan."
    />

    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap"
      rel="stylesheet"
    />

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: { primary: "#7c3aed", accent: "#06b6d4" },
          },
        },
      };
    </script>

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
      crossorigin="anonymous"
    />

    <link rel="stylesheet" href="css/styless.css" />
  </head>
  <body
    class="bg-gradient-to-br from-slate-100 via-sky-50 to-white dark:bg-gradient-to-br dark:from-slate-900 dark:via-slate-800 dark:to-black text-slate-900 dark:text-slate-100 transition-colors duration-300 min-h-screen flex flex-col"
  >
    <!-- Shared Header -->
    <div id="site-header"></div>

    <!-- Main Content -->
    <main class="flex-grow pt-24 pb-16 px-4">
      <div class="max-w-4xl mx-auto">
        
        <!-- Breadcrumb Navigation -->
        <div class="mb-8 fade-in">
          <a href="Latihan.html" class="inline-flex items-center text-sm font-medium text-cyan-500 hover:text-cyan-400 transition-colors group">
            <i class="fa-solid fa-arrow-left mr-2 group-hover:-translate-x-1 transition-transform"></i>
            Kembali ke Learning Archive
          </a>
        </div>

        <!-- Hero Section (Dynamic) -->
        <section class="mb-12 fade-in">
          <div class="glass p-8 rounded-2xl border-l-4 border-cyan-500">
            <div class="flex flex-col md:flex-row gap-6 items-start md:items-center">
              <div class="w-16 h-16 rounded-xl bg-orange-500/10 flex items-center justify-center flex-shrink-0">
                <span id="heroIcon" class="text-3xl">📝</span>
              </div>
              <div class="flex-1">
                <h1 id="heroTitle" class="text-3xl md:text-4xl font-bold mb-3">Memuat Data...</h1>
                <p id="heroDescription" class="text-slate-500 dark:text-slate-400 text-sm md:text-base leading-relaxed mb-4">
                  Silakan tunggu sementara data latihan sedang diambil.
                </p>
                <div class="flex flex-wrap items-center gap-4 text-xs font-semibold">
                  <span class="px-3 py-1 rounded bg-slate-100 dark:bg-white/5 text-slate-600 dark:text-slate-300">
                    <i class="fa-solid fa-calendar mr-2 text-cyan-500"></i>Minggu <span id="heroMinggu">-</span>
                  </span>
                  <span class="px-3 py-1 rounded bg-slate-100 dark:bg-white/5 text-slate-600 dark:text-slate-300">
                    <i class="fa-solid fa-list mr-2 text-purple-500"></i><span id="heroTotal">-</span> Sub Latihan
                  </span>
                  <span class="px-3 py-1 rounded bg-slate-100 dark:bg-white/5 text-slate-600 dark:text-slate-300">
                    <i class="fa-solid fa-clock mr-2 text-orange-500"></i><span id="heroDuration">-</span>
                  </span>
                </div>
              </div>
            </div>
          </div>
        </section>

        <!-- Sub Exercise List (Dynamic) -->
        <section>
          <h2 class="text-xl font-bold mb-6 flex items-center gap-2">
            <i class="fa-solid fa-layer-group text-purple-500"></i> Daftar Materi & Praktik
          </h2>
          <div id="subLatihanContainer" class="flex flex-col gap-4">
            <!-- Will be populated by JavaScript -->
          </div>
        </section>

      </div>
    </main>

    <!-- Shared Footer -->
    <div id="site-footer"></div>

    <script src="js/mainn.js?v=20260319"></script>
    <script src="js/layout-loader.js?v=20260319"></script>
    <script src="latihan-data.js"></script>
    
    <!-- Dynamic Content Script -->
    <script>
      document.addEventListener('DOMContentLoaded', () => {
        if (typeof latihanData === 'undefined') {
          console.error('Data latihan tidak dapat dimuat.');
          return;
        }

        const urlParams = new URLSearchParams(window.location.search);
        const rawId = urlParams.get('id');
        
        const pertemuan = latihanData.find(item => String(item.id) === String(rawId));
        
        if (!pertemuan) {
          document.getElementById('heroTitle').textContent = "Modul Tidak Tersedia";
          document.getElementById('heroDescription').textContent = "Maaf, link mungkin tidak valid atau modul tak lagi tersedia.";
          document.getElementById('heroMinggu').textContent = "-";
          document.getElementById('heroTotal').textContent = "-";
          document.getElementById('heroDuration').textContent = "-";
          
          document.getElementById('subLatihanContainer').innerHTML = `
            <div class="text-center py-10 fade-in">
              <a href="Latihan.html" class="inline-flex items-center bg-cyan-500 hover:bg-cyan-600 text-white font-medium px-6 py-3 rounded-xl transition shadow-lg shadow-cyan-500/30">
                <i class="fa-solid fa-arrow-left mr-2"></i> Kembali ke Arsip
              </a>
            </div>`;
          return;
        }
        
        // Update Hero Section
        document.getElementById('heroIcon').textContent = pertemuan.icon || '📝';
        document.getElementById('heroTitle').textContent = pertemuan.title;
        document.getElementById('heroDescription').textContent = pertemuan.description;
        document.getElementById('heroMinggu').textContent = pertemuan.minggu;
        document.getElementById('heroTotal').textContent = pertemuan.totalSub || pertemuan.subLatihan.length;
        document.getElementById('heroDuration').textContent = pertemuan.duration;
        document.title = `${pertemuan.title} - Learning Archive`;
        
        // Render Sub Latihan Cards
        const container = document.getElementById('subLatihanContainer');
        container.innerHTML = ''; 
        
        const statusConfig = {
          selesai: { color: 'bg-green-500/10 text-green-500 border-green-500/20', text: 'Selesai', icon: 'fa-check-circle' },
          progress: { color: 'bg-yellow-500/10 text-yellow-600 dark:text-yellow-500 border-yellow-500/20', text: 'Dalam Progress', icon: 'fa-clock' },
          belum: { color: 'bg-slate-500/10 text-slate-500 border-slate-500/20', text: 'Belum Mulai', icon: 'fa-circle' }
        };
        
        pertemuan.subLatihan.forEach((sub, index) => {
          const status = statusConfig[sub.status] || statusConfig.belum;
          const icon = sub.icon || 'fa-code';
          
          const card = document.createElement('a');
          card.href = sub.link;
          card.className = 'glass block p-5 md:p-6 rounded-xl hover:shadow-lg hover:border-cyan-500/30 transition-all group';
          
          card.innerHTML = `
            <div class="flex flex-col md:flex-row md:items-center justify-between gap-4">
              <div class="flex items-start gap-4 flex-1">
                <div class="w-10 h-10 rounded-lg bg-gradient-to-r from-purple-500 to-cyan-500 flex items-center justify-center text-white font-bold flex-shrink-0">
                  ${index + 1}
                </div>
                <div>
                  <h3 class="text-lg font-bold mb-1 group-hover:text-cyan-500 transition-colors">${sub.title}</h3>
                  <p class="text-sm text-slate-500 dark:text-slate-400 mb-3 line-clamp-2 md:line-clamp-none">
                    ${sub.description}
                  </p>
                  <div class="flex flex-wrap gap-2 text-xs font-semibold">
                    <span class="px-2 py-1 rounded bg-slate-100 dark:bg-white/5 text-slate-600 dark:text-slate-300">
                      <i class="fa-solid ${icon} mr-1"></i> ${sub.category}
                    </span>
                    <span class="px-2 py-1 rounded border ${status.color}">
                      <i class="fa-solid ${status.icon} mr-1"></i> ${status.text}
                    </span>
                  </div>
                </div>
              </div>
              <div class="hidden md:flex flex-shrink-0 items-center justify-center p-3 rounded-full bg-slate-100 dark:bg-white/5 group-hover:bg-cyan-500 group-hover:text-white transition-colors">
                <i class="fa-solid fa-arrow-right"></i>
              </div>
            </div>
          `;
          
          container.appendChild(card);
        });
      });
    </script>
  </body>
</html>
