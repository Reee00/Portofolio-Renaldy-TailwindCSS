<!DOCTYPE html>
<html lang="id" class="scroll-smooth">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Learning Archive – Ahmad Renaldy</title>
    <link rel="icon" type="image/svg+xml" href="images/Webykai.svg" />
    <meta
      name="description"
      content="Learning Archive: Kumpulan latihan, eksplorasi teknis, dan catatan belajar web development Ahmad Renaldy."
    />
    <meta name="robots" content="index, follow" />

    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap"
      rel="stylesheet"
    />

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: { primary: "#0f766e", accent: "#0284c7" },
          },
        },
      };
    </script>

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
      crossorigin="anonymous"
    />

    <link rel="stylesheet" href="css/styless.css" />
  </head>
  <body
    class="bg-gradient-to-br from-slate-100 via-sky-50 to-white dark:bg-gradient-to-br dark:from-slate-900 dark:via-slate-800 dark:to-black text-slate-900 dark:text-slate-100 transition-colors duration-300 min-h-screen flex flex-col"
  >
    <!-- Shared Header -->
    <div id="site-header"></div>

    <main class="flex-grow pt-24 pb-16">
      <section class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8">

        <!-- Page Header -->
        <div class="mb-10 fade-in">
          <a href="index.html" class="inline-flex items-center text-sm font-medium text-cyan-500 hover:text-cyan-400 transition-colors mb-5 group">
            <i class="fa-solid fa-arrow-left mr-2 group-hover:-translate-x-1 transition-transform"></i>
            Kembali ke Beranda
          </a>
          <h1 class="text-3xl sm:text-4xl font-bold mb-3">
            <i class="fa-solid fa-book-open text-cyan-500 mr-2"></i>Learning Archive
          </h1>
          <p class="text-slate-500 dark:text-slate-400 max-w-2xl text-sm sm:text-base leading-relaxed">
            Arsip pribadi yang mendokumentasikan proses belajar web development — dari HTML dasar hingga JavaScript. 
            Setiap modul berisi sub-latihan yang bisa kamu buka langsung.
          </p>
        </div>

        <!-- Stats Bar -->
        <div class="glass p-4 sm:p-5 rounded-2xl flex flex-wrap items-center justify-center sm:justify-around gap-4 sm:gap-6 text-center mb-10 text-sm fade-in">
          <div>
            <strong id="stat-modul" class="text-2xl text-cyan-500 block mb-0.5">...</strong>
            <span class="text-slate-500 dark:text-slate-400 text-xs">Modul</span>
          </div>
          <div class="hidden sm:block w-px h-8 bg-slate-200 dark:bg-white/10"></div>
          <div>
            <strong id="stat-sub" class="text-2xl text-cyan-500 block mb-0.5">...</strong>
            <span class="text-slate-500 dark:text-slate-400 text-xs">Sub-Latihan</span>
          </div>
          <div class="hidden sm:block w-px h-8 bg-slate-200 dark:bg-white/10"></div>
          <div>
            <strong id="stat-kategori" class="text-2xl text-cyan-500 block mb-0.5">3</strong>
            <span class="text-slate-500 dark:text-slate-400 text-xs">Kategori</span>
          </div>
        </div>

        <!-- Category Filter Tabs -->
        <div class="flex flex-wrap gap-2 sm:gap-3 mb-10 fade-in" id="categoryTabs">
          <button data-filter="all" class="category-tab active px-4 py-2 rounded-full text-sm font-medium transition-all">
            <i class="fa-solid fa-layer-group mr-1.5"></i>Semua
          </button>
          <!-- Tabs are rendered dynamically by JS -->
        </div>

        <!-- Dynamic Archive Container -->
        <div id="archive-container"></div>

      </section>
    </main>

    <!-- Shared Footer -->
    <div id="site-footer"></div>

    <script src="js/mainn.js?v=20260319"></script>
    <script src="js/layout-loader.js?v=20260319"></script>
    <script src="latihan-data.js"></script>

    <style>
      /* Category tab styles */
      .category-tab {
        background: rgba(255,255,255,0.05);
        border: 1px solid transparent;
        color: #94a3b8;
      }
      .category-tab:hover {
        background: rgba(6, 182, 212, 0.08);
        color: #06b6d4;
      }
      .category-tab.active {
        background: linear-gradient(135deg, rgba(6,182,212,0.15), rgba(14,165,233,0.1));
        color: #06b6d4;
        border-color: rgba(6,182,212,0.3);
        box-shadow: 0 0 12px rgba(6,182,212,0.1);
      }
      html:not(.dark) .category-tab {
        background: rgba(0,0,0,0.03);
        color: #64748b;
      }
      html:not(.dark) .category-tab:hover {
        background: rgba(6, 182, 212, 0.06);
        color: #0891b2;
      }
      html:not(.dark) .category-tab.active {
        background: rgba(6,182,212,0.1);
        color: #0891b2;
        border-color: rgba(6,182,212,0.25);
      }

      /* Card colors per category - hardcoded to avoid Tailwind JIT issues */
      .cat-badge-html { background: rgba(249,115,22,0.1); color: #f97316; }
      .cat-badge-css  { background: rgba(59,130,246,0.1); color: #3b82f6; }
      .cat-badge-js   { background: rgba(234,179,8,0.1);  color: #eab308; }

      .cat-icon-html  { background: rgba(249,115,22,0.1); }
      .cat-icon-html i { color: #f97316; }
      .cat-icon-css   { background: rgba(59,130,246,0.1); }
      .cat-icon-css i  { color: #3b82f6; }
      .cat-icon-js    { background: rgba(234,179,8,0.1); }
      .cat-icon-js i   { color: #eab308; }

      .cat-border-html:hover { border-color: rgba(249,115,22,0.3) !important; }
      .cat-border-css:hover  { border-color: rgba(59,130,246,0.3) !important; }
      .cat-border-js:hover   { border-color: rgba(234,179,8,0.3) !important; }

      .cat-heading-html { border-left-color: #f97316; }
      .cat-heading-css  { border-left-color: #3b82f6; }
      .cat-heading-js   { border-left-color: #eab308; }

      /* Smooth category show/hide */
      .category-section { transition: opacity 0.3s ease, transform 0.3s ease; }
      .category-section.hidden-cat { 
        display: none; 
      }
    </style>

    <script>
      document.addEventListener('DOMContentLoaded', () => {
        if (typeof latihanData === 'undefined' || typeof listKategori === 'undefined') {
          console.error("Data latihan atau kategori tidak ditemukan.");
          return;
        }

        const container = document.getElementById('archive-container');
        const tabsContainer = document.getElementById('categoryTabs');
        if (!container) return;

        // Icon map for categories
        const catIcons = { html: 'fa-html5', css: 'fa-css3-alt', js: 'fa-js' };
        const catBrandPrefix = { html: 'fa-brands', css: 'fa-brands', js: 'fa-brands' };

        let totalModul = 0;
        let totalSub = 0;

        // Render category filter tabs
        listKategori.forEach(kategori => {
          const tab = document.createElement('button');
          tab.dataset.filter = kategori.id;
          tab.className = 'category-tab px-4 py-2 rounded-full text-sm font-medium transition-all';
          tab.innerHTML = `<i class="${catBrandPrefix[kategori.id] || 'fa-solid'} ${catIcons[kategori.id] || 'fa-code'} mr-1.5"></i>${kategori.title}`;
          tabsContainer.appendChild(tab);
        });

        // Render category sections
        listKategori.forEach(kategori => {
          const dataKategori = latihanData.filter(item => item.categoryId === kategori.id);
          if (dataKategori.length === 0) return;

          const section = document.createElement('div');
          section.className = `category-section mb-12 fade-in`;
          section.dataset.category = kategori.id;

          // Category heading
          let html = `
            <div class="flex items-center gap-3 mb-6 pl-3 border-l-4 cat-heading-${kategori.id}">
              <div class="w-10 h-10 rounded-lg cat-icon-${kategori.id} flex items-center justify-center">
                <i class="${catBrandPrefix[kategori.id] || 'fa-solid'} ${catIcons[kategori.id] || 'fa-code'} text-xl"></i>
              </div>
              <div>
                <h2 class="text-lg sm:text-xl font-bold">${kategori.title}</h2>
                <p class="text-xs text-slate-500 dark:text-slate-400">${dataKategori.length} modul tersedia</p>
              </div>
            </div>
            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4 sm:gap-5">
          `;

          dataKategori.forEach(item => {
            totalModul++;
            const subCount = item.subLatihan ? item.subLatihan.length : 0;
            totalSub += subCount;

            html += `
              <a href="sublatihan.html?id=${item.id}" 
                 class="glass flex flex-col p-5 rounded-xl border border-transparent cat-border-${kategori.id} hover:shadow-lg hover:-translate-y-0.5 transition-all group h-full">
                
                <!-- Badge Row -->
                <div class="flex items-center justify-between mb-3">
                  <span class="text-xs font-semibold cat-badge-${kategori.id} px-2.5 py-1 rounded-full">
                    Minggu ${item.minggu}
                  </span>
                  <span class="text-xs text-slate-400 dark:text-slate-500">
                    <i class="fa-solid fa-clock mr-1"></i>${item.duration}
                  </span>
                </div>
                
                <!-- Title -->
                <h3 class="font-bold text-base mb-2 line-clamp-2 group-hover:text-cyan-500 transition-colors" title="${item.title}">
                  ${item.icon} ${item.title}
                </h3>
                
                <!-- Description -->
                <p class="text-sm text-slate-500 dark:text-slate-400 mb-4 flex-grow line-clamp-2 leading-relaxed">
                  ${item.description}
                </p>
                
                <!-- Footer -->
                <div class="mt-auto border-t border-slate-200 dark:border-white/10 pt-3 flex items-center justify-between text-xs">
                  <span class="text-slate-400 dark:text-slate-500">
                    <i class="fa-solid fa-list-check mr-1"></i>${subCount} sub-latihan
                  </span>
                  <span class="font-medium text-cyan-600 dark:text-cyan-400 group-hover:text-cyan-500 flex items-center gap-1 transition-colors">
                    Lihat Modul
                    <i class="fa-solid fa-arrow-right text-[10px] group-hover:translate-x-1 transition-transform"></i>
                  </span>
                </div>
              </a>
            `;
          });

          html += `</div>`;
          section.innerHTML = html;
          container.appendChild(section);
        });

        // Update stats
        const statModul = document.getElementById('stat-modul');
        const statSub = document.getElementById('stat-sub');
        if (statModul) statModul.textContent = totalModul;
        if (statSub) statSub.textContent = totalSub;

        // Category filter logic
        tabsContainer.addEventListener('click', (e) => {
          const tab = e.target.closest('.category-tab');
          if (!tab) return;

          // Update active tab
          tabsContainer.querySelectorAll('.category-tab').forEach(t => t.classList.remove('active'));
          tab.classList.add('active');

          const filter = tab.dataset.filter;
          document.querySelectorAll('.category-section').forEach(section => {
            if (filter === 'all' || section.dataset.category === filter) {
              section.classList.remove('hidden-cat');
            } else {
              section.classList.add('hidden-cat');
            }
          });
        });
      });
    </script>
  </body>
</html>
